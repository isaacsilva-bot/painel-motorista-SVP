<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Operação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
        }

        .container { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; /* Aumentado para dar mais palco à logo */
            text-align: center; 
        }
        
        .logo-wrapper {
            width: 100%;
            margin: 10px 0 30px 0;
            display: flex;
            justify-content: center;
        }

        .logo-topo {
            width: 100%; /* Ocupa 100% da largura do card */
            max-width: 450px; 
            height: auto;
            display: block;
            image-rendering: auto;
        }

        h2 { color: #1a73e8; margin-bottom: 20px; }
        .search-box { display: flex; flex-direction: column; gap: 15px; text-align: left; }
        input { padding: 18px; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; }
        button { padding: 18px; background-color: #1a73e8; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; }
        
        .result-card { border-left: 6px solid #34a853; padding: 15px; border-radius: 10px; margin-top: 20px; background: #f9f9f9; text-align: left; }
        .label { font-size: 12px; color: #70757a; font-weight: bold; display: block; }
        .value { font-size: 17px; color: #202124; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-wrapper">
        <img src="empresa.jpg" alt="Logo" class="logo-topo">
    </div>

    <h2>Painel do Motorista</h2>
    
    <div class="search-box">
        <input type="text" id="idInput" placeholder="Digite seu ID" onkeypress="if(event.key === 'Enter') buscar()">
        <button onclick="buscar()">CONSULTAR</button>
    </div>

    <div id="resultado"></div>
</div>

<script>
    let csvData = [];
    window.onload = function() {
        Papa.parse("dados.csv", {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) { csvData = results.data; }
        });
    };

    function buscar() {
        const idBuscado = document.getElementById('idInput').value.trim().toLowerCase();
        const lista = document.getElementById('resultado');
        lista.innerHTML = "";
        if (!idBuscado) return;

        const filtrados = csvData.filter((linha, index) => {
            return index > 0 && linha[0] && linha[0].toString().trim().toLowerCase() === idBuscado;
        });

        if (filtrados.length > 0) {
            filtrados.forEach(linha => {
                lista.innerHTML += `
                    <div class="result-card">
                        <span class="label">ROTA</span><span class="value">${linha[1] || '-'}</span>
                        <span class="label">LOJA</span><span class="value">${linha[3] || '-'}</span>
                        <span class="label">ENDEREÇO</span><span class="value">${linha[4] || '-'}</span>
                        <span class="label">HORÁRIO</span><span class="value"><strong>${linha[6] || '-'}</strong></span>
                    </div>
                `;
            });
        } else {
            lista.innerHTML = "<p style='color:red; margin-top:20px;'>ID não encontrado.</p>";
        }
    }
</script>
</body>
</html>
