<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Coletas - Motorista</title>
    <style>
        :root {
            --primary-orange: #ff6600;
            --dark-orange: #e65c00;
            --light-orange: #fff5ed;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #fdfdfd; 
            margin: 0; 
            padding: 15px; 
            color: #333; 
        }

        .container { max-width: 500px; margin: auto; }

        /* Cabeçalho */
        .header { 
            text-align: center; 
            margin-bottom: 25px; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.1); 
            border-bottom: 4px solid var(--primary-orange);
        }

        .logo { max-width: 140px; margin-bottom: 15px; border-radius: 10px; }
        
        h2 { color: var(--dark-orange); margin: 0; font-size: 22px; }

        /* Campo de Busca */
        .search-area { margin-top: 20px; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary-orange); }

        button { 
            width: 100%; 
            padding: 15px; 
            background-color: var(--primary-orange); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(255, 102, 0, 0.3);
        }
        button:active { transform: scale(0.98); background-color: var(--dark-orange); }

        /* Estilo dos Cards */
        .resumo { 
            font-weight: bold; 
            margin: 20px 0 10px; 
            color: #666; 
            text-align: center;
            font-size: 14px;
        }

        .card-entrega { 
            background: white; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 18px; 
            position: relative;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            border: 1px solid #f0f0f0;
        }

        .card-entrega::before {
            content: "";
            position: absolute;
            left: 0; top: 20px; bottom: 20px;
            width: 5px;
            background: var(--primary-orange);
            border-radius: 0 5px 5px 0;
        }

        .campo { margin-bottom: 12px; }
        .label { 
            font-size: 10px; 
            color: var(--primary-orange); 
            text-transform: uppercase; 
            font-weight: 800;
            display: block;
            margin-bottom: 2px;
        }
        .valor { font-size: 15px; color: #222; font-weight: 500; line-height: 1.4; }

        /* Destaque para Pacotes */
        .pacotes-tag {
            background: var(--light-orange);
            color: var(--dark-orange);
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            font-weight: bold;
            border: 1px dashed var(--primary-orange);
        }

        /* Botão do Mapa */
        .btn-mapa {
            display: inline-block;
            margin-top: 10px;
            color: var(--primary-orange);
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid var(--primary-orange);
            padding: 8px 15px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-mapa:hover { background: var(--primary-orange); color: white; }

        .error { color: #d32f2f; text-align: center; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="empresa.jpg" alt="Logo" class="logo">
        <h2>Painel do Motorista</h2>
        <div class="search-area">
            <input type="text" id="inputID" placeholder="Seu ID Pessoal">
            <button onclick="consultar()">Consultar Rota</button>
        </div>
    </div>

    <div id="resultado"></div>
</div>

<script>
    async function consultar() {
        const idBuscado = document.getElementById('inputID').value.trim();
        const display = document.getElementById('resultado');
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?gid=1606207890&single=true&output=csv";

        if (!idBuscado) return;

        display.innerHTML = "<p style='text-align:center;'>Carregando roteiro...</p>";

        try {
            const response = await fetch(url);
            const csvText = await response.text();
            
            // Quebra as linhas e as colunas (respeitando aspas)
            const linhas = csvText.split(/\r?\n/).map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim()));
            
            const cabecalho = linhas[0];
            const idxID = cabecalho.indexOf("ID do motorista");

            const meusRegistros = linhas.filter(l => l[idxID] === idBuscado);

            if (meusRegistros.length > 0) {
                let html = `<div class="resumo">${meusRegistros.length} PARADAS ENCONTRADAS</div>`;
                
                meusRegistros.forEach(dados => {
                    html += `<div class="card-entrega">`;
                    
                    cabecalho.forEach((col, i) => {
                        const valor = dados[i] || '---';
                        
                        if (col === "Loja / Ponto de Coleta") {
                            html += `<div class="campo"><span class="label">Ponto de Coleta</span><span class="valor" style="font-size:18px; font-weight:bold; color:var(--dark-orange);">${valor}</span></div>`;
                        }
                        else if (col === "Horário de Visita Programado" || col === "Horário de Funcionamento até") {
                            html += `<div class="campo" style="display:inline-block; width:48%;"><span class="label">${col}</span><span class="valor">${valor}</span></div>`;
                        }
                        else if (col === "Endereço Completo") {
                            html += `<div class="campo"><span class="label">Endereço</span><span class="valor">${valor}</span>
                                     <a href="https://www.google.com/maps/search/${encodeURIComponent(valor)}" target="_blank" class="btn-mapa">📍 Abrir no Mapa</a></div>`;
                        }
                        else if (col === "Pacotes Coletados") {
                            html += `<div class="pacotes-tag"><span style="font-size:11px; text-transform:uppercase;">Pacotes:</span> <span style="font-size:20px;">${valor}</span></div>`;
                        }
                    });
                    html += `</div>`;
                });
                display.innerHTML = html;
            } else {
                display.innerHTML = "<p class='error'>Nenhum roteiro disponível para este ID.</p>";
            }

        } catch (error) {
            display.innerHTML = "<p class='error'>Falha na conexão.</p>";
        }
    }
</script>

</body>
</html>
