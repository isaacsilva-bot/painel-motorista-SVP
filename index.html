<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Motorista</title>
    <style>
        :root {
            --primary-orange: #ff6600;
            --dark-orange: #e65c00;
            --light-orange: #fff5ed;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #f8f9fa; 
            margin: 0; 
            padding: 10px; 
            color: #333; 
        }

        .container { max-width: 500px; margin: auto; }

        /* Card Principal de Busca */
        .header-card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; /* Faz a imagem respeitar o arredondamento */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* Imagem preenchendo toda a largura */
        .img-banner { 
            width: 100%; 
            display: block; 
            max-height: 250px; /* Ajuste a altura conforme necessário */
            object-fit: cover; /* Garante que a imagem não distorça */
        }

        .search-content {
            padding: 20px;
            text-align: center;
        }

        h2 { color: var(--dark-orange); margin: 0 0 10px 0; font-size: 24px; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: var(--primary-orange); }

        button { 
            width: 100%; 
            padding: 15px; 
            background-color: var(--primary-orange); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            text-transform: uppercase;
        }

        /* Cards de Resultado */
        .resumo { text-align: center; font-weight: bold; color: #666; margin: 20px 0; }

        .card-entrega { 
            background: white; 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 18px; 
            position: relative;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            border-left: 8px solid var(--primary-orange);
        }

        .label { font-size: 10px; color: var(--primary-orange); text-transform: uppercase; font-weight: 800; display: block; }
        .valor { font-size: 15px; color: #222; font-weight: 500; margin-bottom: 10px; display: block; }

        .pacotes-tag {
            background: var(--light-orange);
            color: var(--dark-orange);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            border: 1px dashed var(--primary-orange);
        }

        .btn-mapa {
            display: inline-block;
            margin-top: 5px;
            color: var(--primary-orange);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <img src="empresa.jpg" alt="Banner Empresa" class="img-banner">
        
        <div class="search-content">
            <h2>Portal Logístico</h2>
            <input type="text" id="inputID" placeholder="Digite seu ID">
            <button onclick="consultar()">Ver Roteiro</button>
        </div>
    </div>

    <div id="resultado"></div>
</div>

<script>
    async function consultar() {
        const idBuscado = document.getElementById('inputID').value.trim();
        const display = document.getElementById('resultado');
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?gid=1606207890&single=true&output=csv";

        if (!idBuscado) return;
        display.innerHTML = "<p style='text-align:center;'>Buscando...</p>";

        try {
            const response = await fetch(url);
            const csvText = await response.text();
            const linhas = csvText.split(/\r?\n/).map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim()));
            
            const cabecalho = linhas[0];
            const idxID = cabecalho.indexOf("ID do motorista");
            const meusRegistros = linhas.filter(l => l[idxID] === idBuscado);

            if (meusRegistros.length > 0) {
                let html = `<div class="resumo">${meusRegistros.length} PARADAS PARA HOJE</div>`;
                meusRegistros.forEach(dados => {
                    html += `<div class="card-entrega">`;
                    cabecalho.forEach((col, i) => {
                        const valor = dados[i] || '---';
                        if (col === "Loja / Ponto de Coleta") {
                            html += `<span class="label">Ponto</span><span class="valor" style="color:var(--dark-orange); font-weight:bold;">${valor}</span>`;
                        } else if (col === "Endereço Completo") {
                            html += `<span class="label">Endereço</span><span class="valor">${valor}</span>
                                     <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(valor)}" target="_blank" class="btn-mapa">📍 Abrir no GPS</a>`;
                        } else if (col === "Pacotes Coletados") {
                            html += `<div class="pacotes-tag">Pacotes: ${valor}</div>`;
                        } else if (["Horário de Visita Programado", "Horário de Funcionamento até"].includes(col)) {
                            html += `<span class="label">${col}</span><span class="valor">${valor}</span>`;
                        }
                    });
                    html += `</div>`;
                });
                display.innerHTML = html;
            } else {
                display.innerHTML = "<p style='text-align:center; color:red; font-weight:bold;'>ID não encontrado.</p>";
            }
        } catch (e) {
            display.innerHTML = "<p style='text-align:center;'>Erro de conexão.</p>";
        }
    }
</script>

</body>
</html>
