<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Operação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; }
        .search-box { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #1a73e8; outline: none; }
        button { padding: 15px; background-color: #1a73e8; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; }
        button:hover { background-color: #1557b0; }
        .result-card { border: 1px solid #e0e0e0; padding: 15px; border-radius: 10px; margin-top: 15px; background: #fff; position: relative; overflow: hidden; }
        .result-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: #34a853; }
        .item { margin-bottom: 10px; }
        .label { font-size: 11px; color: #70757a; text-transform: uppercase; font-weight: bold; display: block; }
        .value { font-size: 15px; color: #202124; font-weight: 500; }
        .error { color: #d93025; text-align: center; margin-top: 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>Painel do Motorista</h2>
    <div class="search-box">
        <input type="text" id="idInput" placeholder="Digite seu ID (ex: 123)">
        <button onclick="buscar()">Consultar Rota</button>
    </div>
    <div id="resultado"></div>
</div>

<script>
    let csvData = [];

    // Função que carrega o arquivo
    function carregarDados() {
        Papa.parse("dados.csv", {
            download: true,
            header: false, // Lemos como lista para não depender de nomes de colunas
            skipEmptyLines: true,
            complete: function(results) {
                csvData = results.data;
                console.log("Dados carregados com sucesso!");
            },
            error: function() {
                document.getElementById('resultado').innerHTML = "<p class='error'>Erro ao carregar arquivo dados.csv</p>";
            }
        });
    }

    function buscar() {
        const idBuscado = document.getElementById('idInput').value.trim().toLowerCase();
        const lista = document.getElementById('resultado');
        lista.innerHTML = "";

        if (!idBuscado) return;

        // Filtra os dados (Coluna 0 é o ID)
        // Usamos .filter para caso o ID tenha mais de uma entrega/loja
        const resultados = csvData.filter(linha => {
            return linha[0] && linha[0].toString().trim().toLowerCase() === idBuscado;
        });

        if (resultados.length > 0) {
            resultados.forEach(linha => {
                // Mapeamento das colunas baseado no que você passou:
                // 0:ID, 1:ROTA, 2:Cod Cliente, 3:Loja, 4:Endereço, 5:Funcionamento, 6:Visita
                lista.innerHTML += `
                    <div class="result-card">
                        <div class="item"><span class="label">Rota</span><span class="value">${linha[1] || '---'}</span></div>
                        <div class="item"><span class="label">Loja</span><span class="value">${linha[3] || '---'}</span></div>
                        <div class="item"><span class="label">Endereço</span><span class="value">${linha[4] || '---'}</span></div>
                        <div class="item"><span class="label">Horário Visita</span><span class="value">${linha[6] || '---'}</span></div>
                        <div class="item"><span class="label">Funcionamento</span><span class="value">${linha[5] || '---'}</span></div>
                    </div>
                `;
            });
        } else {
            lista.innerHTML = "<p class='error'>Nenhuma informação para este ID.</p>";
        }
    }

    window.onload = carregarDados;
</script>

</body>
</html>
