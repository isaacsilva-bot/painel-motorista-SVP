<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Motorista</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 120px; margin-bottom: 15px; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #resultado { margin-top: 20px; text-align: left; font-size: 14px; }
        .item { background: #f9f9f9; padding: 8px; border-bottom: 1px solid #eee; }
        .label { font-weight: bold; color: #555; display: block; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <img src="empresa.jpg" alt="Logo" class="logo">
    <h3>Painel do Colaborador</h3>
    <input type="text" id="idInput" placeholder="Digite seu ID EXATO">
    <button onclick="buscar()">BUSCAR INFORMAÇÕES</button>
    <div id="resultado"></div>
</div>

<script>
    async function buscar() {
        const idBuscado = document.getElementById('idInput').value.trim().toLowerCase();
        const divFina = document.getElementById('resultado');
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?gid=1606207890&single=true&output=csv";

        if(!idBuscado) return alert("Digite um ID");

        divFina.innerHTML = "Pesquisando...";

        try {
            const resp = await fetch(url);
            const csv = await resp.text();
            
            // Divide as linhas e remove aspas extras que o Google coloca
            const linhas = csv.split(/\r?\n/).map(l => l.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
            const cabecalho = linhas[0];
            
            // BUSCA EM TODAS AS COLUNAS (Mais seguro)
            const achado = linhas.slice(1).find(linha => 
                linha.some(celula => celula.toLowerCase() === idBuscado)
            );

            if (achado) {
                let html = "<div style='margin-bottom:10px; color:green;'><b>Sucesso!</b></div>";
                cabecalho.forEach((tit, i) => {
                    if(achado[i]) {
                        html += `<div class="item"><span class="label">${tit}</span> ${achado[i]}</div>`;
                    }
                });
                divFina.innerHTML = html;
            } else {
                divFina.innerHTML = "<b style='color:red;'>ID não encontrado. Verifique se digitou corretamente (Maiúsculas/Minúsculas importam).</b>";
            }
        } catch (e) {
            divFina.innerHTML = "Erro ao conectar com a planilha.";
        }
    }
</script>

</body>
</html>
