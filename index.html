<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Operação - Motoristas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary-color: #1a73e8;
            --success-color: #34a853;
            --bg-color: #f0f2f5;
            --text-dark: #202124;
            --text-light: #5f6368;
            --border-color: #dadce0;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.12); 
            width: 100%; 
            max-width: 440px; 
            text-align: center; 
            margin-top: 20px;
        }
        
        /* Contêiner da Logo - Ajustado para ser maior */
        .logo-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        /* Estilo da Imagem da Logo - MAIOR E NÍTIDA */
        .logo-topo {
            width: 90%;            /* Ocupa 90% da largura interna do card */
            max-width: 380px;      /* Limite máximo para não estourar no PC */
            height: auto;
            display: block;
            image-rendering: -webkit-optimize-contrast; /* Melhora a nitidez em alguns navegadores */
            image-rendering: crisp-edges;
        }

        h2 { 
            color: var(--text-dark); 
            margin-bottom: 25px; 
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .search-box { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            text-align: left; 
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            margin-left: 2px;
        }

        input { 
            padding: 18px; 
            border: 2px solid var(--border-color); 
            border-radius: 14px; 
            font-size: 18px; 
            transition: all 0.2s ease;
            background-color: #fff;
            color: var(--text-dark);
        }

        input:focus { 
            border-color: var(--primary-color); 
            outline: none;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.15);
        }

        button { 
            padding: 18px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: 700;
            transition: background 0.2s, transform 0.1s;
            margin-top: 5px;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Cartões de Resultado */
        .result-card { 
            border: 1px solid #e8eaed; 
            padding: 20px; 
            border-radius: 18px; 
            margin-top: 20px; 
            background: #ffffff; 
            position: relative; 
            text-align: left; 
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card::before { 
            content: ''; 
            position: absolute; 
            left: 0; 
            top: 20px; 
            bottom: 20px; 
            width: 5px; 
            background: var(--success-color); 
            border-radius: 0 4px 4px 0;
        }

        .item { margin-bottom: 14px; }
        .label { 
            font-size: 12px; 
            color: var(--text-light); 
            text-transform: uppercase; 
            font-weight: 800; 
            letter-spacing: 1px;
            display: block; 
            margin-bottom: 4px;
        }

        .value { 
            font-size: 17px; 
            color: var(--text-dark); 
            font-weight: 500; 
            line-height: 1.5;
        }

        hr { border: 0; border-top: 1px solid #f1f3f4; margin: 15px 0; }

        .error { 
            color: #d93025; 
            background-color: #fde8e8;
            padding: 20px;
            border-radius: 14px;
            margin-top: 20px; 
            font-weight: 600; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-wrapper">
        <img src="empresa.jpg" alt="Logo da Empresa" class="logo-topo">
    </div>

    <h2>Painel do Funcionário</h2>
    
    <div class="search-box">
        <label for="idInput">Identificação do Motorista</label>
        <input type="text" id="idInput" placeholder="Digite seu ID" onkeypress="if(event.key === 'Enter') buscar()">
        <button onclick="buscar()">Consultar Informações</button>
    </div>

    <div id="resultado"></div>
</div>

<script>
    let csvData = [];

    function carregarDados() {
        Papa.parse("dados.csv", {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                csvData = results.data;
            }
        });
    }

    function buscar() {
        const idBuscado = document.getElementById('idInput').value.trim().toLowerCase();
        const lista = document.getElementById('resultado');
        lista.innerHTML = "";

        if (!idBuscado) return;

        const filtrados = csvData.filter((linha, index) => {
            if (index === 0 && linha[0] && linha[0].toString().toLowerCase() === "id") return false;
            return linha[0] && linha[0].toString().trim().toLowerCase() === idBuscado;
        });

        if (filtrados.length > 0) {
            filtrados.forEach(linha => {
                lista.innerHTML += `
                    <div class="result-card">
                        <div class="item">
                            <span class="label">📍 Rota</span>
                            <span class="value">${linha[1] || '---'}</span>
                        </div>
                        <div class="item">
                            <span class="label">🏢 Loja / Ponto</span>
                            <span class="value">${linha[3] || '---'}</span>
                        </div>
                        <div class="item">
                            <span class="label">🏠 Endereço Completo</span>
                            <span class="value">${linha[4] || '---'}</span>
                        </div>
                        <div class="item">
                            <span class="label">⏰ Previsão de Visita</span>
                            <span class="value" style="color:var(--primary-color); font-size: 19px;"><strong>${linha[6] || 'A definir'}</strong></span>
                        </div>
                        <hr>
                        <div class="item">
                            <span class="label">ℹ️ Funcionamento do Local</span>
                            <span class="value">${linha[5] || '---'}</span>
                        </div>
                    </div>
                `;
            });
        } else {
            lista.innerHTML = "<div class='error'>ID não encontrado.</div>";
        }
    }

    window.onload = carregarDados;
</script>

</body>
</html>
